<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>НЗНП — Гидроочистка (секция 310)</title>
    <style>
        :root {
            --primary: #0a2647;
            --primary-light: #144272;
            --accent: #205295;
            --accent-light: #2c6faa;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --radius: clamp(0.8rem, 2vw, 1.4rem);
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --transition: 0.25s ease;
            --base-font: clamp(14px, 2.2vw, 30px);
            --header-font: clamp(20px, 3.5vw, 44px);
            --sub-font: clamp(14px, 1.8vw, 28px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            font-size: clamp(14px, 2vw, 28px);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: var(--base-font);
            min-height: 100vh;
            padding-bottom: clamp(60px, 10vh, 120px);
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            padding: clamp(1.2rem, 4vh, 2.5rem) clamp(1rem, 3vw, 2.5rem) clamp(1.2rem, 4vh, 2.5rem);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(10,38,71,0.25);
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: clamp(0.8rem, 2vw, 1.5rem);
            margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
        }
        .header-logo {
            width: clamp(3rem, 8vw, 5.5rem);
            height: clamp(3rem, 8vw, 5.5rem);
            background: #fff;
            border-radius: clamp(0.8rem, 1.5vw, 1.8rem);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(1.5rem, 4vw, 2.8rem);
            color: var(--primary);
            flex-shrink: 0;
        }
        .header-title {
            font-size: var(--header-font);
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .header-subtitle {
            font-size: var(--sub-font);
            opacity: 0.8;
            margin-top: 0.1rem;
        }
        .search-wrap {
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: clamp(0.6rem, 1.5vw, 1.2rem) clamp(2rem, 5vw, 4rem) clamp(0.6rem, 1.5vw, 1.2rem) clamp(0.8rem, 2vw, 1.5rem);
            border-radius: clamp(0.8rem, 1.5vw, 1.8rem);
            border: none;
            font-size: clamp(0.8rem, 1.8vw, 1.4rem);
            background: rgba(255,255,255,0.18);
            color: #fff;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(6px);
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .search-input:focus {
            background: rgba(255,255,255,0.28);
        }
        .search-icon {
            position: absolute;
            right: clamp(0.8rem, 2vw, 1.5rem);
            top: 50%;
            transform: translateY(-50%);
            width: clamp(1.2rem, 2.5vw, 2.2rem);
            height: clamp(1.2rem, 2.5vw, 2.2rem);
            opacity: 0.7;
            pointer-events: none;
        }
        .main {
            padding: clamp(0.8rem, 2vw, 1.8rem);
            display: flex;
            flex-direction: column;
            gap: clamp(0.8rem, 2vw, 1.5rem);
        }
        .detail-grid {
            display: flex;
            flex-direction: column;
            gap: clamp(0.6rem, 1.5vw, 1.2rem);
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: clamp(0.8rem, 2vw, 1.5rem);
            padding: clamp(1rem, 2.5vw, 2rem) clamp(1.2rem, 3vw, 2.5rem);
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid transparent;
            transition: var(--transition);
            cursor: pointer;
            width: 100%;
        }
        .detail-item:active {
            background: #f1f5f9;
            border-color: var(--accent-light);
            transform: scale(0.98);
        }
        .detail-item .tab-icon {
            width: clamp(2.5rem, 6vw, 4.5rem);
            height: clamp(2.5rem, 6vw, 4.5rem);
            border-radius: clamp(0.8rem, 1.5vw, 1.8rem);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: clamp(1.2rem, 3vw, 2.4rem);
            font-weight: 600;
        }
        .tab-icon.blue  { background: #dbeafe; color: #2563eb; }
        .tab-icon.green { background: #d1fae5; color: #059669; }
        .tab-icon.amber { background: #fef3c7; color: #d97706; }
        .tab-icon.red   { background: #fee2e2; color: #dc2626; }
        .tab-icon.teal  { background: #ccfbf1; color: #0d9488; }
        .tab-icon.violet{ background: #ede9fe; color: #7c3aed; }
        .tab-icon.slate { background: #e2e8f0; color: #475569; }
        .tab-icon.pink  { background: #fce7f3; color: #db2777; }
        .tab-icon.indigo{ background: #e0e7ff; color: #4f46e5; }
        .tab-icon.orange{ background: #ffedd5; color: #ea580c; }
        .tab-icon.cyan  { background: #cffafe; color: #0891b2; }
        .tab-icon.lime  { background: #ecfccb; color: #65a30d; }
        .detail-item .tab-label {
            font-size: clamp(0.9rem, 2.2vw, 1.8rem);
            font-weight: 500;
            color: var(--text);
        }
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: clamp(0.5rem, 1.5vw, 1.2rem);
            padding: clamp(0.6rem, 1.5vw, 1.2rem) clamp(0.8rem, 2vw, 1.5rem);
            background: var(--card);
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .btn-bottom {
            flex: 1;
            padding: clamp(0.6rem, 1.5vw, 1.2rem);
            font-size: clamp(0.75rem, 1.5vw, 1.2rem);
            font-weight: 600;
            border-radius: clamp(0.8rem, 1.5vw, 1.8rem);
            cursor: pointer;
            border: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(0.3rem, 0.8vw, 0.6rem);
            min-height: clamp(2.8rem, 6vw, 4.5rem);
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-back {
            background: var(--bg);
            color: var(--text);
        }
        .btn-up {
            background: var(--accent);
            color: #fff;
        }
        .btn-bottom:active {
            transform: scale(0.96);
            opacity: 0.85;
        }
        .btn-bottom svg {
            width: clamp(1.2rem, 2.5vw, 2.2rem);
            height: clamp(1.2rem, 2.5vw, 2.2rem);
            pointer-events: none;
        }
        .detail-header {
            font-size: clamp(1.4rem, 3.2vw, 2.6rem);
            font-weight: 700;
            margin-bottom: clamp(0.8rem, 2vw, 1.5rem);
            color: var(--text);
        }
        #charPage {
            display: none;
            padding: clamp(0.8rem, 2vw, 1.8rem) clamp(0.5rem, 1.5vw, 1rem);
            background: #fff;
            max-width: 800px;
            margin: 0 auto;
        }
        #charPage.active {
            display: block;
        }
        .char-header {
            text-align: center;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            padding: clamp(0.8rem, 2vw, 1.5rem) 0;
            background: #fafafa;
            border-radius: clamp(0.8rem, 1.5vw, 1.8rem);
            margin-bottom: clamp(1.2rem, 3vw, 2.5rem);
            box-shadow: 0 1.5px 6px rgba(0,0,0,0.1);
        }
        .char-header a {
            color: var(--text);
            text-decoration: none;
        }
        .char-table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(0.7rem, 1.6vw, 1.2rem);
            background: #fff;
            box-shadow: 0 1.5px 6px rgba(0,0,0,0.06);
        }
        .char-table td {
            padding: clamp(0.6rem, 1.5vw, 1.2rem) clamp(0.5rem, 1.2vw, 1rem);
            border: 1px solid #ddd;
            vertical-align: middle;
        }
        .char-table .label {
            font-weight: 700;
            background: #f4f4f4;
            width: 40%;
        }
        .char-table .value {
            background: #fafafa;
            width: 60%;
        }
        .char-table .label-alt {
            background: #fafafa;
        }
        .char-table .value-alt {
            background: #f4f4f4;
        }
        .char-nav {
            display: flex;
            justify-content: space-between;
            margin-top: clamp(1.2rem, 3vw, 2.5rem);
            padding: clamp(0.6rem, 1.5vw, 1.2rem) 0;
            background: #fafafa;
            border-radius: clamp(0.8rem, 1.5vw, 1.8rem);
        }
        .char-nav a {
            display: inline-block;
            padding: clamp(0.6rem, 1.5vw, 1.2rem) clamp(0.3rem, 0.8vw, 0.6rem);
            font-weight: 700;
            font-size: clamp(0.7rem, 1.6vw, 1.2rem);
            color: var(--primary);
            text-decoration: none;
            flex: 1;
            text-align: center;
        }
        .char-nav a:active {
            opacity: 0.6;
        }
        #detailPage { display: block; }
        @media (max-width: 480px) {
            .header-title { font-size: clamp(18px, 5vw, 28px); }
            .header-subtitle { font-size: clamp(12px, 3vw, 18px); }
            .detail-item .tab-label { font-size: clamp(14px, 3.5vw, 20px); }
            .char-header { font-size: clamp(1.8rem, 8vw, 3.5rem); }
            .char-table { font-size: clamp(0.65rem, 2.5vw, 1rem); }
            .char-nav a { font-size: clamp(0.6rem, 2.5vw, 1rem); }
            .btn-bottom { font-size: clamp(0.7rem, 2vw, 1rem); }
        }
        @media (min-width: 768px) {
            .char-header { font-size: clamp(2.5rem, 4vw, 4.5rem); }
            .char-table { font-size: clamp(0.9rem, 1.2vw, 1.2rem); }
            .char-nav a { font-size: clamp(0.9rem, 1.2vw, 1.2rem); }

    </style>
</head>

        const charTableBody = document.getElementById('charTableBody');

        const iconColors = ['blue','green','amber','red','teal','violet','pink','indigo','orange','cyan','lime','slate'];

        function renderList() {
            let html = '';
            hydroEquipment.forEach((item, index) => {
                const color = iconColors[index % iconColors.length];
                const firstChar = item.index.charAt(0).toUpperCase();
                html += `
                    <div class="detail-item" onclick="showCharacteristics('${item.index}')">
                        <div class="tab-icon ${color}">${firstChar}</div>
                        <div class="tab-label">${item.index}</div>
                    </div>
                `;
            });
            detailGrid.innerHTML = html;
        }

        // =========================================================================
        // ПОКАЗ ХАРАКТЕРИСТИК
        // =========================================================================
        function showCharacteristics(index) {
            const item = hydroEquipment.find(e => e.index === index);
            if (!item) return;

            detailPage.style.display = 'none';
            charPage.classList.add('active');
            charIndexLink.textContent = index;

            let rows = '';
            item.chars.forEach((field, i) => {
                const labelClass = (i % 2 === 0) ? 'label' : 'label-alt';
                const valueClass = (i % 2 === 0) ? 'value' : 'value-alt';
                rows += `
                    <tr>
                        <td class="${labelClass}"><strong>${field.label}</strong></td>
                        <td class="${valueClass}">${field.value}</td>
                    </tr>
                `;
            });
            charTableBody.innerHTML = rows;

            // Прокрутка к началу страницы характеристик
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // =========================================================================
        // ПОИСК
        // =========================================================================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            const items = document.querySelectorAll('.detail-item');
            if (query === '') {
                items.forEach(el => el.style.display = '');
                return;
            }
            items.forEach(el => {
                const text = el.textContent.toLowerCase();
                el.style.display = text.includes(query) ? '' : 'none';
            });
        });

        // =========================================================================
        // ИНИЦИАЛИЗАЦИЯ
        // =========================================================================
        renderList();

        // Если есть параметр index в URL, можно сразу открыть характеристики
        // (для обратной совместимости)
        const urlParams = new URLSearchParams(window.location.search);
        const indexParam = urlParams.get('index');
        if (indexParam) {
            showCharacteristics(indexParam);
        }
